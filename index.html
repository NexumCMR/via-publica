      <a href="https://www.google.com/maps/search/${encodeURIComponent(b.ubicacion || b.nombre)}" target="_blank" rel="noreferrer" style="display:inline-block;margin-top:10px;color:#ff9a5a;font-weight:700;font-size:12px;text-decoration:none">Ver en Google Maps →</a>
    </div>
  </div>`;

function Mapa({ data, update, go, addUsage }) {
  const { billboards } = data;
  const mapEl = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef({});
  const addModeRef = useRef(false);
  const [ready, setReady] = useState(false);
  const [loadErr, setLoadErr] = useState(false);
  const [addMode, setAddMode] = useState(false);
  const [pending, setPending] = useState(null);
  const [q, setQ] = useState("");
  const [geoBusy, setGeoBusy] = useState(false);
  const [neon, setNeon] = useState(true);
  // panel "empresas cerca de este cartel"
  const [sel, setSel] = useState(null);
  const [rubroCerca, setRubroCerca] = useState("");
  const [loadingCerca, setLoadingCerca] = useState(false);
  const [errCerca, setErrCerca] = useState("");
  const [empresasCerca, setEmpresasCerca] = useState([]);
  const [savedCerca, setSavedCerca] = useState({});
  const selRef = useRef(null);
  useEffect(() => { selRef.current = sel; }, [sel]);

  useEffect(() => { addModeRef.current = addMode; if (mapEl.current) mapEl.current.style.cursor = addMode ? "crosshair" : ""; }, [addMode]);

  /* cargar Leaflet desde CDN */
  useEffect(() => {
    let cancelled = false;
    const init = () => {
      if (cancelled || !window.L || mapRef.current || !mapEl.current) return;
      const L = window.L;
      const map = L.map(mapEl.current, {
        center: [-34.62, -58.44], zoom: 11, minZoom: 9, zoomControl: true,
        maxBounds: [[-35.45, -59.55], [-34.05, -57.65]], maxBoundsViscosity: 0.85,
      });
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '© OpenStreetMap', maxZoom: 19, subdomains: "abc",
      }).addTo(map);
      map.on("click", (e) => {
        if (!addModeRef.current) return;
        setPending({ lat: e.latlng.lat, lng: e.latlng.lng });
        setAddMode(false);
      });
      mapRef.current = map;
      setReady(true);
      // Fix del mapa "en negro": forzar recálculo de tamaño una vez visible
      setTimeout(() => map.invalidateSize(), 200);
      setTimeout(() => map.invalidateSize(), 600);
    };
    if (window.L) { init(); return; }
    if (!document.getElementById("leaflet-css")) {
      const link = document.createElement("link");
      link.id = "leaflet-css"; link.rel = "stylesheet";
      link.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
      document.head.appendChild(link);
    }
    let s = document.getElementById("leaflet-js");
    if (!s) {
      s = document.createElement("script"); s.id = "leaflet-js";
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";
      s.onload = init; s.onerror = () => setLoadErr(true);
      document.body.appendChild(s);
    } else { s.addEventListener("load", init); }
    const t = setTimeout(() => { if (!window.L) setLoadErr(true); }, 10000);
    return () => { cancelled = true; clearTimeout(t); };
  }, []);

  /* dibujar marcadores */
  useEffect(() => {
    if (!ready || !mapRef.current || !window.L) return;
    const L = window.L, map = mapRef.current;
    Object.values(markersRef.current).forEach((m) => map.removeLayer(m));
    markersRef.current = {};
    billboards.forEach((b) => {
      if (typeof b.lat !== "number" || typeof b.lng !== "number") return;
      const icon = L.divIcon({
        className: "", iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -12],
        html: `<div class="leaf-pin" style="--c:${bbColor(b.estado)}"><span class="leaf-pulse"></span><span class="leaf-dot"></span></div>`,
      });
      const m = L.marker([b.lat, b.lng], { icon, draggable: true }).addTo(map);
      m.bindPopup(popupHtml(b), { className: "tech-pop", maxWidth: 240, closeButton: true });
      m.on("click", () => { setSel(b); setEmpresasCerca([]); setRubroCerca(""); setErrCerca(""); setSavedCerca({}); });
      m.on("dragend", (ev) => {
        const { lat, lng } = ev.target.getLatLng();
        update({ billboards: data.billboards.map((x) => x.id === b.id ? { ...x, lat, lng } : x) });
      });
      markersRef.current[b.id] = m;
    });
  }, [billboards, ready]);

  const geocode = async () => {
    if (!q.trim() || !mapRef.current) return;
    setGeoBusy(true);
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=ar&q=${encodeURIComponent(q + ", Buenos Aires, Argentina")}`);
      const j = await r.json();
      if (j && j[0]) mapRef.current.flyTo([+j[0].lat, +j[0].lon], 15);
      else alert("No encontré esa dirección. Probá agregando la localidad.");
    } catch { alert("No pude buscar la dirección en este momento."); }
    setGeoBusy(false);
  };

  const addBillboard = (bb) => {
    update({ billboards: [{ ...bb, id: uid() }, ...billboards] });
    setPending(null);
    if (mapRef.current) mapRef.current.flyTo([bb.lat, bb.lng], 15);
  };

  const buscarCerca = async () => {
    if (!sel || !rubroCerca) { setErrCerca("Elegí un rubro."); return; }
    setLoadingCerca(true); setErrCerca(""); setEmpresasCerca([]); setSavedCerca({});
    try {
      const arr = dedupeEmpresas(await fetchEmpresas({ rubro: rubroCerca, cerca: sel.ubicacion || sel.nombre, cantidad: 10 }));
      addUsage && addUsage(COSTO_BUSQUEDA);
      if (!arr.length) setErrCerca("No encontré empresas claras cerca. Probá otro rubro.");
      setEmpresasCerca(arr);
    } catch {
      setErrCerca("No pude buscar ahora. (Si todavía no publicaste la app con tu clave, la IA aún no está activa.)");
    }
    setLoadingCerca(false);
  };
  const guardarCerca = (e) => {
    const nota = [`Cerca del cartel: ${sel?.nombre}`, e.web && `Web: ${e.web}`, e.redes && `Redes: ${e.redes}`, e.nota].filter(Boolean).join(" · ");
    update({
      clients: [{
        id: uid(), empresa: e.nombre, contacto: "", cargo: "", telefono: e.telefono || "",
        whatsapp: e.telefono || "", email: e.email || "", rubro: rubroCerca, estado: "Prospecto", ultimoContacto: "",
        historial: [{ fecha: today(), tipo: "Nota", nota }]
      }, ...data.clients]
    });
    setSavedCerca((s) => ({ ...s, [e.nombre]: true }));
  };

  return (
    <>
      <div className="toolbar">
        <div className="searchbox"><Search size={18} color="#6b7790" />
          <input placeholder="Buscar dirección o barrio (ej: Av. Cabildo 2000)" value={q}
            onChange={(e) => setQ(e.target.value)} onKeyDown={(e) => e.key === "Enter" && geocode()} /></div>
        <button className="btn btn-ghost" onClick={geocode}>{geoBusy ? "Buscando…" : <><MapPin size={18} /> Ir</>}</button>
        <button className={"btn " + (addMode ? "btn-primary" : "btn-ghost")} onClick={() => setAddMode((v) => !v)}>
          <Plus size={18} /> {addMode ? "Tocá el mapa…" : "Agregar cartel en el mapa"}</button>
        <button className="btn btn-ghost" onClick={() => setNeon((v) => !v)} title="Cambiar estilo del mapa">
          <Sparkles size={18} /> {neon ? "Estilo neón" : "Estilo claro"}</button>
        <div style={{ flex: 1 }} />
        <span className="chip s-gray">{billboards.length} carteles</span>
      </div>

      <div className={"mapwrap" + (neon ? " neon" : "")} style={{ position: "relative" }}>
        <div ref={mapEl} className="leaf-map" />
        <div className="legend" style={{ zIndex: 1000 }}>
          <span><span className="dot" style={{ background: "var(--green)" }} /> Disponible</span>
          <span><span className="dot" style={{ background: "var(--amber)" }} /> Reservado</span>
          <span><span className="dot" style={{ background: "var(--red)" }} /> Ocupado</span>
          <span><span className="dot" style={{ background: "var(--blue)" }} /> Próx. a liberarse</span>
        </div>
        {addMode && <div className="addhint">Tocá el punto del mapa donde está el cartel</div>}
        {loadErr && (
          <div className="empty" style={{ position: "absolute", inset: 0, background: "#0b1422", color: "#9fb0cc", display: "grid", placeContent: "center", borderRadius: 18 }}>
            <MapPin size={40} /><div>No se pudo cargar el mapa. Revisá tu conexión a internet.</div>
          </div>
        )}
        {!ready && !loadErr && (
          <div className="empty" style={{ position: "absolute", inset: 0, background: "#0b1422", color: "#9fb0cc", display: "grid", placeContent: "center", borderRadius: 18 }}>
            <div className="spinner" /><div style={{ marginTop: 10 }}>Cargando mapa de Buenos Aires…</div>
          </div>
        )}
      </div>
      <div className="cell-sub" style={{ marginTop: 10 }}>
        Tip: arrastrá cualquier pin para corregir su ubicación. Tocá un pin para ver sus datos y buscar empresas cerca.
      </div>

      {sel && (
        <div className="card" style={{ marginTop: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, flexWrap: "wrap" }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: 18 }}>{sel.nombre}</div>
              <div className="cell-sub"><MapPin size={13} style={{ verticalAlign: "-2px" }} /> {sel.ubicacion} · {money(sel.precio)} · {sel.estado}</div>
            </div>
            <button className="iconclose" onClick={() => setSel(null)}><X size={18} /></button>
          </div>
          <div style={{ marginTop: 12, fontWeight: 700, fontSize: 15 }}>Buscar empresas cerca de este cartel para ofrecerles publicidad</div>
          <div className="toolbar" style={{ margin: "10px 0 0" }}>
            <select className="select" value={rubroCerca} onChange={(e) => setRubroCerca(e.target.value)}>
              <option value="">Elegí un rubro…</option>{RUBROS.map((r) => <option key={r}>{r}</option>)}</select>
            <button className="btn btn-primary" onClick={buscarCerca} disabled={loadingCerca}>
              {loadingCerca ? <><span className="spinner sm" /> Buscando…</> : <><Search size={18} /> Buscar cerca</>}</button>
          </div>
          {errCerca && <div className="alert a" style={{ marginTop: 10 }}><AlertTriangle size={18} /> {errCerca}</div>}
          {loadingCerca && <div className="empty"><div className="spinner" /><div style={{ marginTop: 10 }}>Buscando {rubroCerca} cerca de {sel.ubicacion}…</div></div>}

          {empresasCerca.length > 0 && (
            <div className="grid cols-2" style={{ marginTop: 14 }}>
              {empresasCerca.map((e, i) => {
                const tel = onlyDigits(e.telefono);
                return (
                  <div className="card" key={i} style={{ display: "flex", flexDirection: "column", gap: 6, boxShadow: "none", background: "#faf8f3" }}>
                    <div style={{ fontWeight: 800, fontSize: 16 }}>{e.nombre}</div>
                    {e.nota && <div className="cell-sub">{e.nota}</div>}
                    <div style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 14, margin: "2px 0" }}>
                      {e.telefono && <div><Phone size={13} style={{ verticalAlign: "-2px" }} /> {e.telefono}</div>}
                      {e.email && <div><Mail size={13} style={{ verticalAlign: "-2px" }} /> {e.email}</div>}
                      {e.web && <div><ExternalLink size={13} style={{ verticalAlign: "-2px" }} /> <a href={e.web.startsWith("http") ? e.web : "https://" + e.web} target="_blank" rel="noreferrer" style={{ color: "var(--blue)" }}>{e.web}</a></div>}
                      {e.redes && <div><MessageCircle size={13} style={{ verticalAlign: "-2px" }} /> {e.redes}</div>}
                    </div>
                    <div className="rowactions" style={{ marginTop: "auto" }}>
                      {tel && <a className="btn btn-icon ico-wa" href={`https://wa.me/${tel}`} target="_blank" rel="noreferrer"><MessageCircle size={18} /></a>}
                      {e.telefono && <a className="btn btn-icon ico-call" href={`tel:${e.telefono}`}><Phone size={18} /></a>}
                      {e.email && <a className="btn btn-icon ico-mail" href={`mailto:${e.email}`}><Mail size={18} /></a>}
                      <div style={{ flex: 1 }} />
                      {savedCerca[e.nombre]
                        ? <span className="chip s-green"><CheckCircle2 size={15} /> Guardado</span>
                        : <button className="btn btn-ghost btn-sm" onClick={() => guardarCerca(e)}><Plus size={16} /> Guardar</button>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {pending && <BBForm initial={{ lat: pending.lat, lng: pending.lng }} onClose={() => setPending(null)}
        onSave={(bb) => addBillboard({ ...bb, precio: Number(bb.precio) || 0 })} />}
    </>
  );
}

/* ====================== PROPUESTAS ====================== */
function Propuestas({ data }) {
  const { clients, billboards } = data;
  const [clienteId, setClienteId] = useState("");
  const [picks, setPicks] = useState([]);
  const [obs, setObs] = useState("");
  const cliente = clients.find((c) => c.id === clienteId);
  const seleccionados = billboards.filter((b) => picks.includes(b.id));
  const total = seleccionados.reduce((s, b) => s + (Number(b.precio) || 0), 0);
  const toggle = (id) => setPicks((p) => p.includes(id) ? p.filter((x) => x !== id) : [...p, id]);

  const [pq, setPq] = useState("");
  const [pTipo, setPTipo] = useState("Todos");
  const [pEstado, setPEstado] = useState("Todos");
  const listaCarteles = billboards.filter((b) => {
    const okQ = (b.nombre + " " + (b.ubicacion || "")).toLowerCase().includes(pq.toLowerCase());
    const okT = pTipo === "Todos" || b.tipo === pTipo;
    const okE = pEstado === "Todos" || b.estado === pEstado;
    return okQ && okT && okE;
  });

  return (
    <>
      <div className="grid cols-2">
        <div className="card">
          <h2 style={{ fontSize: 18, marginBottom: 12 }}>1 · Elegí el cliente</h2>
          <select className="select" style={{ width: "100%" }} value={clienteId} onChange={(e) => setClienteId(e.target.value)}>
            <option value="">— Seleccionar cliente —</option>
            {clients.map((c) => <option key={c.id} value={c.id}>{c.empresa} · {c.contacto}</option>)}
          </select>
          <div className="field" style={{ marginTop: 16 }}><label>Observaciones de la propuesta</label>
            <textarea value={obs} onChange={(e) => setObs(e.target.value)} placeholder="Vigencia, descuentos, condiciones…" /></div>
        </div>
        <div className="card">
          <h2 style={{ fontSize: 18, marginBottom: 6 }}>Resumen</h2>
          <div className="cell-sub">Cliente: <b style={{ color: "var(--ink)" }}>{cliente ? cliente.empresa : "—"}</b></div>
          <div className="cell-sub">Carteles seleccionados: <b style={{ color: "var(--ink)" }}>{seleccionados.length}</b></div>
          <div style={{ fontSize: 34, fontWeight: 800, fontFamily: "Bricolage Grotesque", marginTop: 14 }}>{money(total)}</div>
          <div className="cell-sub">Total mensual estimado</div>
          <button className="btn btn-primary" style={{ width: "100%", marginTop: 16 }}
            disabled={!cliente || !seleccionados.length}
            onClick={() => window.print()}><Printer size={19} /> Exportar a PDF</button>
          <div className="cell-sub" style={{ marginTop: 8, textAlign: "center" }}>Se abre el diálogo de impresión → elegí “Guardar como PDF”.</div>
        </div>
      </div>

      <div className="section-title">2 · Seleccioná los carteles</div>
      <div className="toolbar">
        <div className="searchbox"><Search size={18} color="#6b7790" />
          <input placeholder="Buscar cartel por nombre o ubicación…" value={pq} onChange={(e) => setPq(e.target.value)} /></div>
        <select className="select" value={pTipo} onChange={(e) => setPTipo(e.target.value)}>
          <option>Todos</option>{TIPOS.map((t) => <option key={t}>{t}</option>)}</select>
        <select className="select" value={pEstado} onChange={(e) => setPEstado(e.target.value)}>
          <option>Todos</option>{BB_ESTADOS.map((e) => <option key={e}>{e}</option>)}</select>
        {seleccionados.length > 0 && <button className="btn btn-ghost btn-sm" onClick={() => setPicks([])}><X size={16} /> Limpiar selección</button>}
      </div>
      <div className="grid cols-3">
        {listaCarteles.map((b) => (
          <label className={"prop-pick" + (picks.includes(b.id) ? " on" : "")} key={b.id}>
            <input type="checkbox" checked={picks.includes(b.id)} onChange={() => toggle(b.id)} />
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700 }}>{b.nombre} {b.premium && <Star size={13} fill="#ffd24a" color="#d98a00" />}</div>
              <div className="cell-sub">{b.ubicacion} · {b.tipo}</div>
              <div style={{ fontWeight: 800, marginTop: 4 }}>{money(b.precio)}</div>
            </div>
          </label>
        ))}
        {!listaCarteles.length && <div className="empty" style={{ gridColumn: "1/-1" }}><LayoutPanelTop size={36} /><div>No hay carteles que coincidan con la búsqueda.</div></div>}
      </div>

      {/* PRINT AREA */}
      <div className="print-area">
        <div style={{ borderBottom: "3px solid #e8590c", paddingBottom: 16, marginBottom: 20 }}>
          <h1 style={{ fontSize: 28 }}>Propuesta Comercial</h1>
          <div style={{ color: "#6b7790" }}>Publicidad en Vía Pública · {fmtDate(today())}</div>
        </div>
        {cliente && <div style={{ marginBottom: 20 }}>
          <h2 style={{ fontSize: 18 }}>Cliente</h2>
          <div><b>{cliente.empresa}</b></div>
          <div>{cliente.contacto}{cliente.cargo ? " · " + cliente.cargo : ""}</div>
          <div>{cliente.telefono} · {cliente.email}</div>
        </div>}
        <h2 style={{ fontSize: 18, marginBottom: 8 }}>Espacios propuestos</h2>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr style={{ background: "#f4f1ea" }}>
            <th style={{ textAlign: "left", padding: 8, border: "1px solid #e6e1d6" }}>Cartel</th>
            <th style={{ textAlign: "left", padding: 8, border: "1px solid #e6e1d6" }}>Ubicación</th>
            <th style={{ textAlign: "left", padding: 8, border: "1px solid #e6e1d6" }}>Tipo / Medidas</th>
            <th style={{ textAlign: "right", padding: 8, border: "1px solid #e6e1d6" }}>Precio</th>
          </tr></thead>
          <tbody>
            {seleccionados.map((b) => (
              <tr key={b.id}>
                <td style={{ padding: 8, border: "1px solid #e6e1d6" }}>{b.nombre}{b.obs ? ` — ${b.obs}` : ""}</td>
                <td style={{ padding: 8, border: "1px solid #e6e1d6" }}>{b.ubicacion}</td>
                <td style={{ padding: 8, border: "1px solid #e6e1d6" }}>{b.tipo} · {b.medidas}</td>
                <td style={{ padding: 8, border: "1px solid #e6e1d6", textAlign: "right" }}>{money(b.precio)}</td>
              </tr>
            ))}
            <tr><td colSpan={3} style={{ padding: 8, textAlign: "right", fontWeight: 800, border: "1px solid #e6e1d6" }}>TOTAL</td>
              <td style={{ padding: 8, textAlign: "right", fontWeight: 800, border: "1px solid #e6e1d6" }}>{money(total)}</td></tr>
          </tbody>
        </table>
        {obs && <div style={{ marginTop: 20 }}><h2 style={{ fontSize: 16 }}>Observaciones</h2><p>{obs}</p></div>}
      </div>
    </>
  );
}

/* ====================== PROSPECTAR ====================== */
function Prospectar({ data, update, go, addUsage, setBudget }) {
  const { clients } = data;
  const [rubro, setRubro] = useState("");
  const [zona, setZona] = useState("CABA");
  const [loading, setLoading] = useState(false);
  const [loadingMore, setLoadingMore] = useState(false);
  const [error, setError] = useState("");
  const [resultados, setResultados] = useState([]);
  const [saved, setSaved] = useState({});
  const [showManual, setShowManual] = useState(false);
  const [draft, setDraft] = useState({ empresa: "", web: "", telefono: "", email: "", red: "" });
  const [buscandoC, setBuscandoC] = useState({});

  const buscarContacto = async (i) => {
    const e = resultados[i];
    setBuscandoC((s) => ({ ...s, [i]: true })); setError("");
    try {
      const c = await fetchContacto({ nombre: e.nombre, web: e.web });
      addUsage && addUsage(COSTO_BUSQUEDA);
      const emailOk = c.email && !/protected|\[email/i.test(c.email);
      setResultados((rs) => rs.map((x, idx) => idx === i ? {
        ...x,
        email: emailOk ? c.email : x.email,
        telefono: c.telefono || x.telefono,
        web: x.web || c.web,
        redes: x.redes || c.redes,
        nota: c.nota ? (x.nota ? x.nota + " · " + c.nota : c.nota) : x.nota,
      } : x));
    } catch {
      setError("No pude buscar el contacto ahora. Reintentá en unos segundos.");
    }
    setBuscandoC((s) => ({ ...s, [i]: false }));
  };

  const savedCount = Object.keys(saved).length;

  const buscarIA = async () => {
    if (!rubro) { setError("Elegí un rubro primero."); return; }
    setLoading(true); setError(""); setResultados([]); setSaved({});
    try {
      const arr = dedupeEmpresas(await fetchEmpresas({ rubro, zona, cantidad: 12 }));
      addUsage && addUsage(COSTO_BUSQUEDA);
      if (!arr.length) setError("No encontré resultados claros. Probá con otra zona o rubro.");
      setResultados(arr);
    } catch (e) {
      setError("No pude completar la búsqueda ahora. (Si todavía no publicaste la app con tu clave, la IA aún no está activa.)");
    }
    setLoading(false);
  };

  const buscarMas = async () => {
    setLoadingMore(true); setError("");
    try {
      const nuevos = await fetchEmpresas({ rubro, zona, cantidad: 10, exclude: resultados.map((r) => r.nombre) });
      addUsage && addUsage(COSTO_BUSQUEDA);
      const todos = dedupeEmpresas([...resultados, ...nuevos]);
      if (todos.length === resultados.length) setError("No encontré más empresas distintas por ahora.");
      setResultados(todos);
    } catch (e) {
      setError("No pude traer más empresas ahora. Reintentá en unos segundos.");
    }
    setLoadingMore(false);
  };

  const guardar = (e) => {
    const nota = [e.web && `Web: ${e.web}`, e.redes && `Redes: ${e.redes}`, e.nota].filter(Boolean).join(" · ");
    update({
      clients: [{
        id: uid(), empresa: e.nombre, contacto: "", cargo: "", telefono: e.telefono || "",
        whatsapp: e.telefono || "", email: e.email || "", rubro, estado: "Prospecto", ultimoContacto: "",
        historial: nota ? [{ fecha: today(), tipo: "Nota", nota }] : []
      }, ...clients]
    });
    setSaved((s) => ({ ...s, [e.nombre]: true }));
  };

  const guardarManual = () => {
    if (!draft.empresa.trim()) return;
    const nota = [draft.web && `Web: ${draft.web}`, draft.red && `Redes: ${draft.red}`].filter(Boolean).join(" · ");
    update({
      clients: [{
        id: uid(), empresa: draft.empresa, contacto: "", cargo: "", telefono: draft.telefono,
        whatsapp: draft.telefono, email: draft.email, rubro, estado: "Prospecto", ultimoContacto: "",
        historial: nota ? [{ fecha: today(), tipo: "Nota", nota }] : []
      }, ...clients]
    });
    setDraft({ empresa: "", web: "", telefono: "", email: "", red: "" });
    alert("Prospecto guardado en Clientes ✓");
  };

  return (
    <>
      <div className="card" style={{ marginBottom: 18 }}>
        <h2 style={{ fontSize: 18, marginBottom: 4, display: "flex", alignItems: "center", gap: 8 }}>
          <Sparkles size={20} color="var(--accent)" /> Buscar empresas por rubro</h2>
        <div className="cell-sub" style={{ marginBottom: 14 }}>Elegí un rubro y una zona. La IA busca en la web y trae empresas reales con sus datos de contacto públicos.</div>
        <div className="toolbar" style={{ marginBottom: 8 }}>
          <select className="select" value={rubro} onChange={(e) => setRubro(e.target.value)}>
            <option value="">Elegí un rubro…</option>{RUBROS.map((r) => <option key={r}>{r}</option>)}</select>
          <div className="searchbox"><MapPin size={18} color="#6b7790" />
            <input placeholder="Zona (ej: CABA, Zona Norte, La Plata)" value={zona} onChange={(e) => setZona(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && buscarIA()} /></div>
          <button className="btn btn-primary" onClick={buscarIA} disabled={loading}>
            {loading ? <><span className="spinner sm" /> Buscando…</> : <><Search size={18} /> Buscar con IA</>}</button>
        </div>
        {error && <div className="alert a" style={{ marginTop: 6 }}><AlertTriangle size={18} /> {error}</div>}
        <div className="cell-sub" style={{ marginTop: 6 }}>Los datos provienen de fuentes públicas en la web. Verificá siempre antes de contactar.</div>
        {(() => {
          const restante = Math.max(0, (data.budget || 0) - (data.usage?.gasto || 0));
          const nBusq = Math.floor(restante / COSTO_BUSQUEDA);
          const low = restante <= (data.budget || 0) * 0.15;
          return (
            <div className="budget-panel">
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <Sparkles size={16} color="var(--accent)" />
                <span style={{ fontWeight: 700 }}>Crédito estimado del mes:</span>
                <span style={{ fontWeight: 800, color: low ? "var(--red)" : "var(--green)" }}>US$ {restante.toFixed(2)}</span>
                <span className="cell-sub">de US$ {(data.budget || 0).toFixed(2)} · alcanza para ~{nBusq} búsqueda(s)</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span className="cell-sub">Tope mensual:</span>
                <span style={{ fontWeight: 700 }}>US$</span>
                <input type="number" min="1" step="1" value={data.budget || 0}
                  onChange={(e) => setBudget && setBudget(Math.max(0, Number(e.target.value) || 0))}
                  style={{ width: 70, padding: "8px 10px", border: "1.5px solid var(--line)", borderRadius: 10, fontSize: 15 }} />
              </div>
              {low && <div className="cell-sub" style={{ color: "var(--red)", fontWeight: 700, width: "100%" }}>⚠️ Te queda poco crédito estimado este mes. Usá las búsquedas con cuidado.</div>}
              <div className="cell-sub" style={{ width: "100%" }}>Cada búsqueda cuesta ~US$ {COSTO_BUSQUEDA.toFixed(2)} (estimado). Es solo una guía; el saldo real lo ves en tu cuenta de Anthropic.</div>
            </div>
          );
        })()}
      </div>

      {loading && (
        <div className="empty"><div className="spinner" /><div style={{ marginTop: 12 }}>Buscando empresas reales de {rubro} en {zona || "Buenos Aires"}…</div>
          <div className="cell-sub">Esto puede tardar unos segundos.</div></div>
      )}

      {resultados.length > 0 && (
        <>
          <div className="section-title" style={{ justifyContent: "space-between" }}>
            <span style={{ display: "flex", alignItems: "center", gap: 8 }}><Building2 size={20} color="var(--accent)" /> {resultados.length} empresas encontradas</span>
            {savedCount > 0 && <button className="btn btn-ghost btn-sm" onClick={() => go("clientes")}><Users size={16} /> Ver {savedCount} prospecto(s) guardado(s)</button>}
          </div>
          <div className="grid cols-2">
            {resultados.map((e, i) => {
              const tel = onlyDigits(e.telefono);
              return (
                <div className="card" key={i} style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  <div style={{ fontWeight: 800, fontSize: 17 }}>{e.nombre}</div>
                  {e.nota && <div className="cell-sub">{e.nota}</div>}
                  <div style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 14, margin: "4px 0" }}>
                    {e.telefono && <div><Phone size={13} style={{ verticalAlign: "-2px" }} /> {e.telefono}</div>}
                    {e.email && <div><Mail size={13} style={{ verticalAlign: "-2px" }} /> {e.email}</div>}
                    {e.web && <div><ExternalLink size={13} style={{ verticalAlign: "-2px" }} /> <a href={e.web.startsWith("http") ? e.web : "https://" + e.web} target="_blank" rel="noreferrer" style={{ color: "var(--blue)" }}>{e.web}</a></div>}
                    {e.redes && <div><MessageCircle size={13} style={{ verticalAlign: "-2px" }} /> {e.redes}</div>}
                    {!e.telefono && !e.email && !e.web && <div className="cell-sub">Sin datos de contacto públicos encontrados.</div>}
                  </div>
                  <button className="btn btn-ghost btn-sm" onClick={() => buscarContacto(i)} disabled={buscandoC[i]} style={{ alignSelf: "flex-start" }}>
                    {buscandoC[i] ? <><span className="spinner sm" /> Buscando contacto…</> : <><Sparkles size={15} /> Buscar mail y teléfono</>}
                  </button>
                  <div className="rowactions" style={{ marginTop: "auto" }}>
                    {tel && <a className="btn btn-icon ico-wa" href={`https://wa.me/${tel}`} target="_blank" rel="noreferrer"><MessageCircle size={18} /></a>}
                    {e.telefono && <a className="btn btn-icon ico-call" href={`tel:${e.telefono}`}><Phone size={18} /></a>}
                    {e.email && <a className="btn btn-icon ico-mail" href={`mailto:${e.email}`}><Mail size={18} /></a>}
                    <div style={{ flex: 1 }} />
                    {saved[e.nombre]
                      ? <span className="chip s-green"><CheckCircle2 size={15} /> Guardado</span>
                      : <button className="btn btn-ghost btn-sm" onClick={() => guardar(e)}><Plus size={16} /> Guardar prospecto</button>}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ display: "flex", justifyContent: "center", marginTop: 16 }}>
            <button className="btn btn-primary" onClick={buscarMas} disabled={loadingMore}>
              {loadingMore ? <><span className="spinner sm" /> Buscando más…</> : <><Plus size={18} /> Buscar más empresas</>}</button>
          </div>
        </>
      )}

      <div style={{ marginTop: 22, display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
        <button className="btn btn-ghost" onClick={() => setShowManual((v) => !v)}><Pencil size={18} /> Cargar empresa a mano</button>
        <button className="btn btn-ghost" onClick={() => go("clientes")}><Users size={18} /> Ver clientes</button>
        {rubro && <a className="btn btn-ghost" href={`https://www.google.com/maps/search/${encodeURIComponent(rubro + " " + zona)}`} target="_blank" rel="noreferrer"><MapPin size={18} /> Ver en Google Maps</a>}
      </div>

      {showManual && (
        <div className="card" style={{ marginTop: 16 }}>
          <h2 style={{ fontSize: 17, marginBottom: 4 }}>Cargar empresa como prospecto</h2>
          <div className="cell-sub" style={{ marginBottom: 14 }}>Rubro asignado: <b style={{ color: "var(--ink)" }}>{rubro || "—"}</b></div>
          <div className="field"><label>Nombre de empresa *</label><input value={draft.empresa} onChange={(e) => setDraft({ ...draft, empresa: e.target.value })} /></div>
          <div className="form-grid">
            <div className="field"><label>Sitio web</label><input value={draft.web} onChange={(e) => setDraft({ ...draft, web: e.target.value })} /></div>
            <div className="field"><label>Teléfono / WhatsApp</label><input value={draft.telefono} onChange={(e) => setDraft({ ...draft, telefono: e.target.value })} /></div>
            <div className="field"><label>Email público</label><input value={draft.email} onChange={(e) => setDraft({ ...draft, email: e.target.value })} /></div>
            <div className="field"><label>Redes sociales</label><input value={draft.red} onChange={(e) => setDraft({ ...draft, red: e.target.value })} placeholder="@usuario / link" /></div>
          </div>
          <button className="btn btn-primary" onClick={guardarManual}><Plus size={18} /> Guardar como prospecto</button>
        </div>
      )}
    </>
  );
}

/* ====================== ENVIAR MAILS (campaña) ====================== */
const PLANTILLA_MAIL = `Hola, ¿cómo están?

Mi nombre es [TU NOMBRE] y trabajo en publicidad en vía pública (carteles, pantallas LED y medianeras en CABA y Gran Buenos Aires).

Me gustaría acercarles algunas ubicaciones disponibles que pueden ayudar a dar más visibilidad a su marca. Si les interesa, con gusto les envío una propuesta con fotos, ubicaciones y precios.

¿Tendrían unos minutos para conversarlo?

Muchas gracias y quedo a disposición.
Saludos cordiales,
[TU NOMBRE] — [TU TELÉFONO]`;

function Mails({ data }) {
  const { clients } = data;
  const conMail = useMemo(() => clients.filter((c) => c.email && c.email.includes("@")), [clients]);
  const [filtro, setFiltro] = useState("Todos");
  const [sel, setSel] = useState(() => new Set(clients.filter((c) => c.email && c.email.includes("@") && c.estado === "Prospecto").map((c) => c.id)));
  const [subject, setSubject] = useState("Propuesta de publicidad en vía pública");
  const [body, setBody] = useState(PLANTILLA_MAIL);
  const [copiado, setCopiado] = useState("");

  const lista = conMail.filter((c) => filtro === "Todos" || c.estado === filtro);
  const elegidos = conMail.filter((c) => sel.has(c.id));
  const emails = elegidos.map((c) => c.email);

  const toggle = (id) => setSel((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const todos = () => setSel(new Set(lista.map((c) => c.id)));
  const ninguno = () => setSel(new Set());

  const mailtoHref = `mailto:?bcc=${encodeURIComponent(emails.join(","))}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  const copiar = async (txt, msg) => {
    try { await navigator.clipboard.writeText(txt); setCopiado(msg); setTimeout(() => setCopiado(""), 2500); }
    catch { alert(txt); }
  };

  return (
    <>
      <div className="card" style={{ marginBottom: 18, display: "flex", gap: 14, alignItems: "flex-start" }}>
        <span style={{ width: 44, height: 44, borderRadius: 12, background: "var(--blue-bg)", color: "var(--blue)", display: "grid", placeItems: "center", flexShrink: 0 }}><Mail size={22} /></span>
        <div>
          <div style={{ fontWeight: 800, fontSize: 17, marginBottom: 4 }}>Enviá un mail a varios prospectos de una vez</div>
          <div style={{ color: "var(--ink2)", fontSize: 15, lineHeight: 1.5 }}>
            Elegí a quiénes escribir, ajustá el texto y tocá <b>“Abrir mail con todos”</b>. Se abre tu app de correo con todos en <b>copia oculta (CCO)</b> y el mensaje listo: vos solo revisás y enviás. Así, en vez de 2 o 3 por día, podés escribir a muchos en minutos.
          </div>
        </div>
      </div>

      <div className="grid cols-2">
        {/* Destinatarios */}
        <div className="card">
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, flexWrap: "wrap", marginBottom: 10 }}>
            <h2 style={{ fontSize: 17 }}>Destinatarios ({elegidos.length} elegidos)</h2>
            <div style={{ display: "flex", gap: 8 }}>
              <button className="btn btn-ghost btn-sm" onClick={todos}>Todos</button>
              <button className="btn btn-ghost btn-sm" onClick={ninguno}>Ninguno</button>
            </div>
          </div>
          <select className="select" style={{ width: "100%", marginBottom: 12 }} value={filtro} onChange={(e) => setFiltro(e.target.value)}>
            <option>Todos</option>{ESTADOS.map((e) => <option key={e}>{e}</option>)}
          </select>
          <div style={{ maxHeight: 320, overflowY: "auto", display: "flex", flexDirection: "column", gap: 8 }}>
            {lista.map((c) => (
              <label key={c.id} className={"prop-pick" + (sel.has(c.id) ? " on" : "")}>
                <input type="checkbox" checked={sel.has(c.id)} onChange={() => toggle(c.id)} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700 }}>{c.empresa}</div>
                  <div className="cell-sub" style={{ wordBreak: "break-word" }}>{c.email}</div>
                </div>
                <span className={"chip " + estadoClass(c.estado)} style={{ fontSize: 11 }}>{c.estado}</span>
              </label>
            ))}
            {!lista.length && <div className="empty"><Mail size={34} /><div>No hay contactos con email en este filtro.</div><div className="cell-sub">Guardá prospectos con email desde “Buscar empresas”.</div></div>}
          </div>
        </div>

        {/* Mensaje */}
        <div className="card">
          <h2 style={{ fontSize: 17, marginBottom: 12 }}>Mensaje</h2>
          <div className="field"><label>Asunto</label><input value={subject} onChange={(e) => setSubject(e.target.value)} /></div>
          <div className="field"><label>Texto del mail</label><textarea style={{ minHeight: 200 }} value={body} onChange={(e) => setBody(e.target.value)} /></div>
          <div className="cell-sub" style={{ marginBottom: 12 }}>Acordate de reemplazar <b>[TU NOMBRE]</b> y <b>[TU TELÉFONO]</b>.</div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            <a className={"btn btn-primary" + (emails.length ? "" : " ")} href={emails.length ? mailtoHref : undefined}
              onClick={(e) => { if (!emails.length) { e.preventDefault(); alert("Elegí al menos un destinatario."); } }}>
              <Mail size={18} /> Abrir mail con todos ({emails.length})</a>
            <button className="btn btn-ghost" onClick={() => copiar(emails.join(", "), "¡Correos copiados!")} disabled={!emails.length}><FileText size={18} /> Copiar correos</button>
            <button className="btn btn-ghost" onClick={() => copiar(body, "¡Texto copiado!")}><FileText size={18} /> Copiar texto</button>
          </div>
          {copiado && <div className="chip s-green" style={{ marginTop: 12 }}><CheckCircle2 size={15} /> {copiado}</div>}
          <div className="cell-sub" style={{ marginTop: 12 }}>
            Tip: si tenés muchísimos correos, tu app de mail puede pedirte enviarlos en tandas. También podés “Copiar correos” y pegarlos en el CCO de Gmail.
          </div>
        </div>
      </div>
    </>
  );
}

/* ====================== ASISTENTE ====================== */
function Asistente({ data, addUsage }) {
  const { clients, billboards, meetings, tasks } = data;
  const [msgs, setMsgs] = useState([{ from: "bot", text: "¡Hola! Soy tu asistente. Preguntame lo que quieras sobre tus clientes, seguimientos y carteles. Tocá una sugerencia o escribime." }]);
  const [input, setInput] = useState("");
  const [thinking, setThinking] = useState(false);
  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, thinking]);

  const grupos = [
    { t: "Seguimiento", chips: ["¿A quién tengo que llamar?", "Clientes que hace más de 15 días no contacto", "Próximos seguimientos"] },
    { t: "Clientes", chips: ["¿Qué empresas tengo en negociación?", "Clientes interesados", "¿Cuántos clientes tengo?"] },
    { t: "Carteles", chips: ["Carteles premium disponibles", "Carteles disponibles", "Ranking premium"] },
    { t: "Resumen", chips: ["Hacéme un resumen del día", "¿Cuánto puedo facturar con lo disponible?"] },
  ];

  // intérprete local instantáneo
  const responderLocal = (qRaw) => {
    const q = qRaw.toLowerCase();
    const has = (...w) => w.some((x) => q.includes(x));
    const mapC = (arr, sub) => arr.map((c) => ({ client: c, a: c.empresa, sub: sub(c) }));

    const byName = clients.find((c) => c.empresa && c.empresa.length > 3 && q.includes(c.empresa.toLowerCase()));
    if (byName) return { handled: true, text: `Ficha de ${byName.empresa}:`, items: [{ client: byName, a: byName.empresa, sub: `${byName.contacto || "Sin contacto"} · ${byName.estado} · ${byName.ultimoContacto ? "hace " + daysSince(byName.ultimoContacto) + "d" : "sin registro"}` }] };

    if (has("resumen", "cómo viene", "como viene", "del día", "del dia", "cómo estoy", "como estoy")) {
      const venc = clients.filter((c) => daysSince(c.ultimoContacto) > 15 && c.estado !== "Cliente activo").length;
      const neg = clients.filter((c) => c.estado === "En negociación").length;
      const disp = billboards.filter((b) => b.estado === "Disponible").length;
      const reun = meetings.filter((m) => m.fecha >= today()).length;
      const tk = tasks.filter((t) => !t.done).length;
      return { handled: true, text: `Resumen de hoy:\n• ${venc} seguimiento(s) vencido(s) (+15 días)\n• ${neg} empresa(s) en negociación\n• ${disp} cartel(es) disponible(s)\n• ${reun} reunión(es) próxima(s)\n• ${tk} tarea(s) pendiente(s)` };
    }
    if (has("facturar", "facturación", "facturacion", "ingreso", "potencial", "cuánto puedo", "cuanto puedo")) {
      const actual = billboards.filter((b) => b.estado === "Ocupado" || b.estado === "Reservado").reduce((s, b) => s + (+b.precio || 0), 0);
      const libre = billboards.filter((b) => b.estado === "Disponible").reduce((s, b) => s + (+b.precio || 0), 0);
      return { handled: true, text: `Facturación estimada por mes:\n• Ya colocado (ocupado + reservado): ${money(actual)}\n• Potencial libre por vender (disponibles): ${money(libre)}` };
    }
    if (has("llamar", "tengo que llamar", "a quién")) {
      const r = clients.filter((c) => c.estado !== "Cliente activo" && daysSince(c.ultimoContacto) >= 7 && daysSince(c.ultimoContacto) < 9999)
        .sort((a, b) => daysSince(b.ultimoContacto) - daysSince(a.ultimoContacto)).slice(0, 8);
      return { handled: true, text: r.length ? "Te conviene contactar a:" : "No tenés llamadas pendientes urgentes. ¡Buen momento para prospectar!", items: mapC(r, (c) => `hace ${daysSince(c.ultimoContacto)} días · ${c.estado}`) };
    }
    if (has("premium") && has("dispon", "libre")) {
      const r = billboards.filter((b) => b.premium && b.estado === "Disponible");
      return { handled: true, text: r.length ? `Carteles premium disponibles (${r.length}):` : "No hay carteles premium disponibles ahora.", items: r.map((b) => ({ a: b.nombre, sub: b.ubicacion, b: money(b.precio) })) };
    }
    if (has("ranking") || (has("premium") && !has("dispon"))) {
      const r = [...billboards].filter((b) => b.premium).sort((a, b) => b.precio - a.precio);
      return { handled: true, text: `Ranking de carteles premium:`, items: r.map((b, i) => ({ a: `#${i + 1} ${b.nombre}`, sub: b.estado, b: money(b.precio) })) };
    }
    if (has("negocia")) {
      const r = clients.filter((c) => c.estado === "En negociación");
      return { handled: true, text: r.length ? `En negociación (${r.length}):` : "No tenés empresas en negociación ahora.", items: mapC(r, (c) => `${c.contacto || ""} · hace ${daysSince(c.ultimoContacto)}d`) };
    }
    if (has("interesad")) {
      const r = clients.filter((c) => c.estado === "Interesado");
      return { handled: true, text: r.length ? `Clientes interesados (${r.length}):` : "No hay clientes marcados como interesados.", items: mapC(r, (c) => c.rubro || c.estado) };
    }
    if (has("seguimiento", "próximo", "proximo", "vencid", "más de 15", "mas de 15", "no contact", "más tiempo", "mas tiempo")) {
      const min = has("30") ? 30 : has("15") ? 15 : 7;
      const r = clients.filter((c) => c.estado !== "Cliente activo" && daysSince(c.ultimoContacto) >= min && daysSince(c.ultimoContacto) < 9999)
        .sort((a, b) => daysSince(b.ultimoContacto) - daysSince(a.ultimoContacto));
      return { handled: true, text: r.length ? `Seguimientos pendientes (+${min} días):` : "¡No tenés seguimientos pendientes! Todo al día.", items: mapC(r, (c) => `hace ${daysSince(c.ultimoContacto)} días`) };
    }
    if (has("dispon", "libre") && has("cartel", "espacio")) {
      const r = billboards.filter((b) => b.estado === "Disponible");
      return { handled: true, text: `Carteles disponibles (${r.length}):`, items: r.map((b) => ({ a: `${b.nombre} · ${b.tipo}`, sub: b.ubicacion, b: money(b.precio) })) };
    }
    if (has("ocupad")) {
      const r = billboards.filter((b) => b.estado === "Ocupado");
      return { handled: true, text: `Carteles ocupados (${r.length}):`, items: r.map((b) => ({ a: b.nombre, sub: b.ubicacion })) };
    }
    if (has("cuántos clientes", "cuantos clientes", "total de clientes") || (has("cuánto", "cuantos", "cuántos") && has("cliente"))) {
      const by = {}; clients.forEach((c) => { by[c.estado] = (by[c.estado] || 0) + 1; });
      return { handled: true, text: `Tenés ${clients.length} clientes en total:`, items: Object.entries(by).map(([k, v]) => ({ a: k, b: String(v) })) };
    }
    if (has("prospect")) {
      const r = clients.filter((c) => c.estado === "Prospecto");
      return { handled: true, text: `Prospectos (${r.length}):`, items: mapC(r, (c) => c.rubro || "") };
    }
    if (has("reunion", "reunión")) {
      const r = meetings.filter((m) => m.fecha >= today()).sort((a, b) => a.fecha.localeCompare(b.fecha));
      return { handled: true, text: r.length ? "Tus próximas reuniones:" : "No tenés reuniones próximas cargadas.", items: r.map((m) => ({ a: m.titulo, b: fmtDate(m.fecha) })) };
    }
    if (has("tarea", "pendiente")) {
      const r = tasks.filter((t) => !t.done);
      return { handled: true, text: r.length ? "Tareas pendientes:" : "No tenés tareas pendientes.", items: r.map((t) => ({ a: t.titulo, b: t.tipo })) };
    }
    return { handled: false };
  };

  // IA para preguntas libres
  const responderIA = async (question) => {
    const ctx = {
      clientes: clients.slice(0, 60).map((c) => ({ empresa: c.empresa, contacto: c.contacto, cargo: c.cargo, estado: c.estado, rubro: c.rubro, telefono: c.telefono, email: c.email, ultimoContacto: c.ultimoContacto, diasSinContacto: c.ultimoContacto ? daysSince(c.ultimoContacto) : null })),
      carteles: billboards.slice(0, 60).map((b) => ({ nombre: b.nombre, tipo: b.tipo, estado: b.estado, precio: b.precio, premium: b.premium, ubicacion: b.ubicacion })),
      reuniones: meetings, tareas: tasks, hoy: today(),
    };
    const prompt = `Sos el asistente de una app personal de ventas de publicidad en vía pública en Argentina. Respondé en español rioplatense, claro, cálido y breve (máximo 6 líneas). Usá EXCLUSIVAMENTE estos datos del sistema y NO inventes nada que no esté acá. Si la respuesta no está en los datos, decílo con amabilidad y sugerí qué podría cargar.
DATOS: ${JSON.stringify(ctx)}
PREGUNTA: "${question}"`;
    try {
      const res = await fetch("/api/anthropic", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-5", max_tokens: 1000, messages: [{ role: "user", content: prompt }] }),
      });
      const j = await res.json();
      const text = (j.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n").trim();
      addUsage && addUsage(COSTO_ASISTENTE);
      return text || "No pude generar una respuesta. Probá reformular la pregunta.";
    } catch {
      return "No pude conectarme para responder esa pregunta ahora. Probá con una de las sugerencias de arriba.";
    }
  };

  const send = async (txt) => {
    const t = (txt ?? input).trim(); if (!t || thinking) return;
    setInput("");
    setMsgs((m) => [...m, { from: "user", text: t }]);
    const local = responderLocal(t);
    if (local.handled) {
      setMsgs((m) => [...m, { from: "bot", text: local.text, items: local.items }]);
      return;
    }
    setThinking(true);
    const answer = await responderIA(t);
    setThinking(false);
    setMsgs((m) => [...m, { from: "bot", text: answer }]);
  };

  return (
    <div className="chat">
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 6 }}>
        {grupos.map((g) => (
          <div key={g.t}>
            <div style={{ fontSize: 12, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".04em", color: "var(--muted)", marginBottom: 6 }}>{g.t}</div>
            <div className="suggestions">{g.chips.map((s) => <button key={s} className="sug" onClick={() => send(s)}>{s}</button>)}</div>
          </div>
        ))}
      </div>

      {msgs.map((m, i) => (
        <div className={"bubble " + m.from} key={i}>
          <div style={{ whiteSpace: "pre-line" }}>{m.text}</div>
          {m.items && m.items.length > 0 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 10 }}>
              {m.items.map((it, j) => (
                <div className="ans-item" key={j}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 700 }}>{it.a}</div>
                    {it.sub && <div style={{ fontSize: 12, color: "var(--muted)" }}>{it.sub}</div>}
                  </div>
                  {it.b && <b style={{ whiteSpace: "nowrap" }}>{it.b}</b>}
                  {it.client && <ContactBtns c={it.client} />}
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
      {thinking && <div className="bubble bot"><span className="spinner sm" style={{ borderTopColor: "var(--accent)" }} /> Pensando…</div>}
      <div ref={endRef} />

      <div className="askbar">
        <input placeholder="Escribí tu pregunta…" value={input}
          onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && send()} />
        <button className="btn btn-primary" onClick={() => send()} disabled={thinking}><Sparkles size={18} /> Preguntar</button>
      </div>
    </div>
  );
}
